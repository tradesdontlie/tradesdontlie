name: build profile assets

on:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "assets/cards/**"
      - "profile-3d-contrib/**"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: generate 3d contribution graph
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: tradesdontlie
          SETTING_JSON: conf/3d-settings.json

      - name: make skyline animation loop
        run: python3 scripts/loopify.py profile-3d-contrib/profile-skyline.svg

      - name: build repo cards
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/build_cards.py

      - name: commit refreshed assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/cards profile-3d-contrib
          git diff --cached --quiet || git commit -m "chore: refresh profile assets"
          git push
