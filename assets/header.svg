      <g><line x1="530" y1="138" x2="530" y2="192" stroke="#3fb950" stroke-width="2"/><rect x="522" y="146" width="16" height="38" rx="2" fill="#3fb950"/>
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.042;0.083;0.9;0.958;1" dur="12s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" values="0 20;0 20;0 0;0 0" keyTimes="0;0.042;0.083;1" dur="12s" repeatCount="indefinite"/></g>
      <g><line x1="570" y1="120" x2="570" y2="172" stroke="#3fb950" stroke-width="2"/><rect x="562" y="128" width="16" height="36" rx="2" fill="#3fb950"/>
