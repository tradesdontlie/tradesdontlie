<svg width="880" height="240" viewBox="0 0 880 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="glow" x1="0" y1="0" x2="880" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00d4aa" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#00d4aa"/>
      <stop offset="1" stop-color="#00d4aa" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="frame"><rect width="880" height="240" rx="12"/></clipPath>
  </defs>

  <g clip-path="url(#frame)">
