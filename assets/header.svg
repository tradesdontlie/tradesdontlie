    <rect x="0" y="212" width="880" height="28" fill="#010409"/>
    <line x1="0" y1="212" x2="880" y2="212" stroke="url(#glow)" stroke-width="1"/>
    <g font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="12">
      <text y="230" fill="#8b949e">
        <tspan fill="#3fb950">▲</tspan> TRADINGVIEW-MCP 4,180★&#160;&#160;&#160;<tspan fill="#3fb950">▲</tspan> TASK-MANAGER-MCP 36★&#160;&#160;&#160;<tspan fill="#3fb950">▲</tspan> PINE-SCRIPT-V6 28★&#160;&#160;&#160;<tspan fill="#3fb950">▲</tspan> PINESCRIPT-WORKSPACE 14★&#160;&#160;&#160;<tspan fill="#3fb950">▲</tspan> QUEEN-CALCULATOR 10★&#160;&#160;&#160;<tspan fill="#3fb950">▲</tspan> MONTE-CARLO 9★&#160;&#160;&#160;<tspan fill="#3fb950">▲</tspan> TRADINGVIEW-MCP 4,180★&#160;&#160;&#160;<tspan fill="#3fb950">▲</tspan> TASK-MANAGER-MCP 36★&#160;&#160;&#160;<tspan fill="#3fb950">▲</tspan> PINE-SCRIPT-V6 28★&#160;&#160;&#160;<tspan fill="#3fb950">▲</tspan> PINESCRIPT-WORKSPACE 14★&#160;&#160;&#160;<tspan fill="#3fb950">▲</tspan> QUEEN-CALCULATOR 10★&#160;&#160;&#160;<tspan fill="#3fb950">▲</tspan> MONTE-CARLO 9★</text>
        <animateTransform attributeName="transform" type="translate" values="0 0;-1030 0" dur="24s" repeatCount="indefinite"/>
    </g>
